<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
</head>
<body style="margin:0;padding:0;background-color:#f4f6f8;font-family:Arial,Helvetica,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center" style="padding:40px 0;">
        <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;padding:40px;">

          <!-- HEADER -->
          <tr>
            <td align="center" style="padding-bottom:30px;">
              <h2 style="margin:0;color:#1e3a8a;">BorderLink</h2>
              <p style="margin:5px 0 0;color:#555;">Recuperación de contraseña</p>
            </td>
          </tr>

          <!-- CONTENT -->
          <tr>
            <td style="padding:20px 0;text-align:center;">

              <p style="margin:0 0 10px;color:#333;">
                Hola{% if email %} {{ email }}{% endif %},
              </p>

              <p style="margin:0 0 20px;color:#555;">
                Usa el siguiente código para restablecer tu contraseña:
              </p>

              <!-- PIN -->
              <div style="
                display:inline-block;
                font-size:36px;
                letter-spacing:12px;
                font-weight:bold;
                background:#f1f5f9;
                color:#1e293b;
                padding:18px 28px;
                border-radius:8px;
                margin:20px 0;
              ">
                {{ pin }}
              </div>

              <p style="margin:20px 0 0;color:#555;">
                Este código expira en <strong>{{ minutes }} minutos</strong>.
              </p>

            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td align="center" style="padding-top:30px;font-size:12px;color:#888;">
              Si no solicitaste este cambio, puedes ignorar este correo.
              <br><br>
              BorderLink © {{ year }}
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
